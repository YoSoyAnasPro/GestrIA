<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d1b2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/png" href="/img/logo.png">
  <title>Gestria - Sistema de Gestión de Reservas</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="login-screen" class="login-screen">
      <div class="login-card">
        <div class="login-logo">
          <img src="/img/logo.png" alt="Gestria" style="width:72px;height:72px;border-radius:18px;margin-bottom:16px;box-shadow:0 8px 32px rgba(0,0,0,0.3)">
          <h1>Gestria</h1>
          <p>Sistema de Gestión de Reservas</p>
        </div>
        <form id="login-form">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" required placeholder="tu@email.com">
          </div>
          <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="login-password" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary btn-full">Iniciar Sesión</button>
          <p class="login-link">¿No tienes cuenta? <a href="#" id="show-register">Crear cuenta</a></p>
          <div id="login-error" class="error-msg" style="display:none"></div>
        </form>
        <form id="register-form" style="display:none">
          <div class="form-group">
            <label>Tu nombre</label>
            <input type="text" id="reg-name" required placeholder="Nombre completo">
          </div>
          <div class="form-group">
            <label>Nombre del negocio</label>
            <input type="text" id="reg-business" required placeholder="Mi Barbería">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email" required placeholder="tu@email.com">
          </div>
          <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="reg-password" required placeholder="Mínimo 6 caracteres">
          </div>
          <button type="submit" class="btn btn-primary btn-full">Crear Cuenta</button>
          <p class="login-link"><a href="#" id="show-login">Volver al login</a></p>
          <div id="register-error" class="error-msg" style="display:none"></div>
        </form>
      </div>
    </div>

    <div id="main-app" class="main-app" style="display:none">
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <img src="/img/logo.png" alt="Gestria" style="width:36px;height:36px;border-radius:10px">
          <span>Gestria</span>
        </div>
        <nav class="sidebar-nav" id="sidebar-nav"></nav>
        <div class="sidebar-footer">
          <div class="user-info">
            <div class="user-avatar" id="user-avatar">A</div>
            <div class="user-details">
              <span id="user-name">Usuario</span>
              <span id="user-business">Negocio</span>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:4px">
            <label class="theme-toggle" title="Modo claro/oscuro">
              <input type="checkbox" id="theme-toggle">
              <div class="theme-slider"><i class="fas fa-sun"></i><i class="fas fa-moon"></i></div>
            </label>
            <button class="btn-icon" id="logout-btn" title="Cerrar sesión">
              <i class="fas fa-sign-out-alt"></i>
            </button>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <header class="top-bar">
          <button class="btn-icon menu-toggle" id="menu-toggle">
            <i class="fas fa-bars"></i>
          </button>
          <div class="top-bar-title" id="page-title">Dashboard</div>
          <div class="top-bar-actions">
            <button class="btn btn-primary btn-sm" id="quick-book-btn">
              <i class="fas fa-plus"></i> Nueva Reserva
            </button>
          </div>
        </header>
        <div class="content-area" id="content-area"></div>
      </main>
    </div>

    <div id="modal-overlay" class="modal-overlay" style="display:none">
      <div class="modal" id="modal">
        <div class="modal-header">
          <h3 id="modal-title"></h3>
          <button class="btn-icon modal-close" id="modal-close"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
